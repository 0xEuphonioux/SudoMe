# SudoMe syslog forwarding
# Install: sudo cp this file to /etc/rsyslog.d/99-sudome.conf
# Then:    sudo systemctl restart rsyslog
#
# This forwards SudoMe events (grant, revoke, auto-revoke)
# to a remote syslog server. Uncomment and set your server IP.

# ── Local logging (always on) ─────────────────────────────────────────
# Log SudoMe to a dedicated log file
if $programname == 'sudome-helper' or $programname == 'sudome-daemon' then {
    action(type="omfile" file="/var/log/sudome.log")
    stop
}

# ── Remote forwarding (uncomment to enable) ────────────────────────────
# Forward SudoMe events to a remote syslog server via UDP
