<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the SudoMe bus name -->
  <policy user="root">
    <allow own="org.freedesktop.sudome"/>
    <allow send_destination="org.freedesktop.sudome"/>
    <allow receive_sender="org.freedesktop.sudome"/>
  </policy>

  <!-- Logged-in users can send to the bus but not own it -->
  <policy at_console="true">
    <allow send_destination="org.freedesktop.sudome"
           send_interface="org.freedesktop.sudome.Daemon"/>
    <allow receive_sender="org.freedesktop.sudome"/>
  </policy>

  <!-- Everyone else: deny everything -->
  <policy context="default">
    <deny send_destination="org.freedesktop.sudome"/>
    <deny receive_sender="org.freedesktop.sudome"/>
    <deny own="org.freedesktop.sudome"/>
  </policy>
</busconfig>
