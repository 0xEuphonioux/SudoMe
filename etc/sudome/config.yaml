# SudoMe Configuration
# /etc/sudome/config.yaml
#
# This file configures the default behavior of SudoMe.
# These defaults can be overridden by the user in their
# first session of each grant.

# ── Timing ─────────────────────────────────────────────────────────────
# Default duration for sudo grants (minutes)
default_duration: 30

# Maximum allowed duration for a single grant (minutes, 0 = unlimited)
max_duration: 480

# How often the daemon checks for expired grants (seconds)
daemon_check_interval: 30

# ── Behavior ───────────────────────────────────────────────────────────
# Automatically revoke sudo at user logout
revoke_on_logout: true

# Automatically revoke sudo when screen locks
revoke_on_screen_lock: true

# Automatically revoke sudo when system sleeps
revoke_on_sleep: true

# Automatically revoke sudo when time/date changes
revoke_on_time_change: true

# Automatically revoke sudo on shutdown/restart
revoke_on_shutdown: true

# Prompt user for reason when requesting sudo (enforced via CLI)
require_reason: false

# Show desktop notification before expiry (seconds before, 0 = disabled)
notify_before_expiry: 300

# ── Logging ────────────────────────────────────────────────────────────
# Log all grant/revoke events to syslog
log_to_syslog: true

# Syslog facility
syslog_facility: "auth"

# ── Notifications ──────────────────────────────────────────────────────
# Enable desktop notifications
desktop_notifications: true

# ── Webhooks ───────────────────────────────────────────────────────────
# POST JSON to this URL on grant/revoke events (leave empty to disable)
# webhook_url: "https://your-siem.example.com/hooks/sudome"

# ── GUI ────────────────────────────────────────────────────────────────
# Show system tray icon
show_tray_icon: true

# Show remaining time in tray icon
show_tray_timer: true
